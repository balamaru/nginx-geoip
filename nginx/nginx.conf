# ===============================
# Load Dynamic Module
# ===============================
load_module modules/ngx_http_geoip2_module.so;

worker_processes auto;
pid /var/run/nginx.pid;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile        on;
  keepalive_timeout  65;

  # ===============================
  # GeoIP2 Databases
  # (files MUST exist, mounted via volume)
  # ===============================
  geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
    $geoip_country_code country iso_code;
    $geoip_country_name country names en;
  }

  geoip2 /etc/nginx/geoip/GeoLite2-City.mmdb {
    $geoip_city_name city names en;
    $geoip_latitude location latitude;
    $geoip_longitude location longitude;
  }

  # ===============================
  # Log format for Telegraf
  # ===============================
  log_format telegraf_geo
    '$remote_addr '
    '$status '
    '$request_time '
    '"$request" '
    '"$geoip_country_code" '
    '"$geoip_country_name" '
    '"$geoip_city_name" '
    '$geoip_latitude '
    '$geoip_longitude';

  access_log /var/log/nginx/access.log telegraf_geo;

  # ===============================
  # Server
  # ===============================
  server {
    listen 80 default_server;
    server_name _;

    location / {
      return 200 "Hello Geo Monitoring\n";
    }

    location /nginx_status {
      stub_status;
      access_log off;
      allow all;
    }
  }
}
