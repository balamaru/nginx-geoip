[agent]
  interval = "10s"
  round_interval = true
  metric_batch_size = 1000
  metric_buffer_limit = 10000

[global_tags]
  service = "nginx"
  env = "dev"
  instance = "nginx-1"

[[outputs.influxdb_v2]]
  urls = ["http://influxdb:8086"]
  token = "supersecrettoken"
  organization = "monitoring"
  bucket = "nginx"

# === NGINX stub_status ===
[[inputs.nginx]]
  urls = ["http://nginx/nginx_status"]

# === Parse NGINX access log ===
[[inputs.tail]]
  files = ["/var/log/nginx/access.log"]
  from_beginning = true
  name_override = "nginx_access"
  data_format = "grok"

  grok_patterns = [
    '%{IPORHOST:client_ip} %{NUMBER:status:int} %{NUMBER:request_time:float} "%{WORD:method} %{DATA:path} HTTP/%{NUMBER:http_version}"'
  ]

  grok_custom_patterns = '''
IPORHOST (?:\d{1,3}\.){3}\d{1,3}|localhost
'''

# === GEOIP ENRICHMENT ===
[[processors.geoip]]
  source = "client_ip"
  database = "/etc/telegraf/GeoLite2-City.mmdb"

  [processors.geoip.tags]
    country = "country_iso_code"
    city = "city_name"

  [processors.geoip.fields]
    latitude = "latitude"
    longitude = "longitude"
