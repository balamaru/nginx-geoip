version: "3.9"

services:
  influxdb:
    image: influxdb:2.7
    container_name: influxdb
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
      - ./influxdb/init.sh:/docker-entrypoint-initdb.d/init.sh
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: kuceng
      DOCKER_INFLUXDB_INIT_PASSWORD: belagak12345
      DOCKER_INFLUXDB_INIT_ORG: monitoring
      DOCKER_INFLUXDB_INIT_BUCKET: nginx
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: supersecrettoken
    networks:
      - monitoring

  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    ports:
      - "3000:3000"
    depends_on:
      - influxdb
    volumes:
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: kuceng
      GF_SECURITY_ADMIN_PASSWORD: belagak
    networks:
      - monitoring

  telegraf:
    image: telegraf:1.30
    container_name: telegraf
    depends_on:
      - influxdb
      - nginx
    volumes:
      - ./telegraf/telegraf.conf:/etc/telegraf/telegraf.conf:ro
      - ./nginx/logs:/var/log/nginx:ro
    networks:
      - monitoring

  nginx:
    build: ./nginx
    #image: czerasz/nginx-geoip2:latest
    container_name: nginx
    ports:
      - "8080:80"
      #- "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/geoip:/etc/nginx/geoip:ro
      - ./nginx/logs:/var/log/nginx
      #- ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - monitoring

volumes:
  influxdb-data:
  grafana-data:

networks:
  monitoring:
