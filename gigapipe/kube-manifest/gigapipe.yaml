---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: gigapipe-sa
  namespace: monitoring
imagePullSecrets:
  - name: regcred

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: gigapipe-sa
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: v1
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gigapipe-sa
rules:
  - apiGroups:     ['policy']
    resources:     ['podsecuritypolicies']
    verbs:         ['use']
    resourceNames: ['gigapipe-sa']
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - endpoints
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - ingresses/status
    verbs:
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: gigapipe-sa
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: gigapipe-sa
subjects:
  - kind: ServiceAccount
    name: gigapipe-sa
    namespace: monitoring

---
apiVersion: v1
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: gigapipe-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: gigapipe-sa
subjects:
- kind: ServiceAccount
  name: gigapipe-sa
  namespace: monitoring

---
apiVersion: v1
kind: Secret
metadata:
  name: gigapipe-secret
  namespace: monitoring
type: Opaque
stringData:
  # Format: user:password (gigapipe pakai default user ClickHouse)
  CLICKHOUSE_AUTH: "gigapipe:gigapipe123"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gigapipe
  namespace: monitoring
  labels:
    app: gigapipe
spec:
  replicas: 1
  selector:
    matchLabels:
      app: gigapipe
  template:
    metadata:
      labels:
        app: gigapipe
    spec:
      initContainers:
        # Tunggu ClickHouse benar-benar ready sebelum Gigapipe start
        - name: wait-clickhouse
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for ClickHouse..."
              until wget -qO- http://clickhouse:8123/ping 2>/dev/null | grep -q "Ok"; do
                sleep 2
              done
              echo "ClickHouse is ready!"
      containers:
        - name: gigapipe
          image: ghcr.io/metrico/gigapipe:latest
          ports:
            - name: loki-api
              containerPort: 3100
          # Gunakan list string bukan map untuk menghindari env override
          env:
            - name: CLICKHOUSE_SERVER
              value: "clickhouse"
            - name: CLICKHOUSE_PORT
              value: "9000"
            - name: CLICKHOUSE_DB
              value: "gigapipe"
            - name: CLICKHOUSE_PROTO
              value: "http"
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "3100"
            - name: DEBUG
              value: "false"
            - name: CLICKHOUSE_AUTH
              valueFrom:
                secretKeyRef:
                  name: gigapipe-secret
                  key: CLICKHOUSE_AUTH
          livenessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 3100
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: gigapipe
  namespace: monitoring
spec:
  selector:
    app: gigapipe
  ports:
    - name: loki-api
      port: 3100
      targetPort: 3100
  type: ClusterIP
