---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail-sa
  namespace: monitoring
imagePullSecrets:
  - name: regcred

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: promtail-sa
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: v1
kind: ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: promtail-sa
rules:
  - apiGroups:     ['policy']
    resources:     ['podsecuritypolicies']
    verbs:         ['use']
    resourceNames: ['promtail-sa']
  - apiGroups:
      - ""
    resources:
      - pods
      - services
      - endpoints
      - secrets
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - ingresses
    verbs:
      - get
      - list
      - watch
  - apiGroups:
      - extensions
    resources:
      - ingresses/status
    verbs:
      - update

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: promtail-sa
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: promtail-sa
subjects:
  - kind: ServiceAccount
    name: promtail-sa
    namespace: monitoring

---
apiVersion: v1
kind: ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
metadata:
  name: promtail-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail-sa
subjects:
- kind: ServiceAccount
  name: promtail-sa
  namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: monitoring
data:
  promtail-config.yml: |
    server:
      http_listen_port: 9080
      grpc_listen_port: 0

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://gigapipe:3100/loki/api/v1/push
        batchwait: 1s
        batchsize: 102400
        timeout: 10s

    scrape_configs:
      - job_name: nginx
        static_configs:
          - targets:
              - localhost
            labels:
              job: nginx
              host: nginx01
              agent: promtail
              __path__: /var/log/nginx/access.log

        pipeline_stages:
          - match:
              selector: '{job="nginx"}'
              stages:
                - json:
                    expressions:
                      remote_addr:        remote_addr
                      status:             status
                      request:            request
                      request_uri:        request_uri
                      request_time:       request_time
                      body_bytes_sent:    body_bytes_sent
                      bytes_sent:         bytes_sent
                      http_user_agent:    http_user_agent
                      request_method:     request_method
                      geoip_country_code: geoip_country_code
                      geoip_country_name: geoip_country_name
                      geoip_city_name:    geoip_city_name
                      geoip_latitude:     geoip_latitude
                      geoip_longitude:    geoip_longitude
                - labels:
                    status:
                    request_method:
                    geoip_country_code:
                    geoip_country_name:
                    geoip_city_name:

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: promtail
  namespace: monitoring
  labels:
    app: promtail
spec:
  replicas: 1
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      initContainers:
        # Tunggu Gigapipe ready sebelum Promtail mulai push
        - name: wait-gigapipe
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for Gigapipe..."
              until wget -qO- http://gigapipe:3100/ready 2>/dev/null; do
                sleep 3
              done
              echo "Gigapipe is ready!"
      containers:
        - name: promtail
          image: grafana/promtail:2.9.4
          args:
            - -config.file=/etc/promtail/config.yml
          ports:
            - containerPort: 9080
          volumeMounts:
            - name: promtail-config
              mountPath: /etc/promtail/config.yml
              subPath: promtail-config.yml
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
      volumes:
        - name: promtail-config
          configMap:
            name: promtail-config
        - name: nginx-logs
          persistentVolumeClaim:
            claimName: nginx-logs-pvc
