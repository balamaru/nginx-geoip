---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: telegraf-sa
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: telegraf-sa
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: telegraf-sa
rules:
  - apiGroups:     ['policy']
    resources:     ['podsecuritypolicies']
    verbs:         ['use']
    resourceNames: ['telegraf-sa']
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["ingresses", "ingresses/status"]
    verbs: ["get", "list", "watch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: telegraf-sa
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: telegraf-sa
subjects:
  - kind: ServiceAccount
    name: telegraf-sa
    namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: telegraf-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: telegraf-sa
subjects:
- kind: ServiceAccount
  name: telegraf-sa
  namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: monitoring
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000

    [global_tags]
      service = "nginx"
      env = "dev"
      instance = "nginx-1"

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb:8086"]
      token = "SYxE3hPS2pSHPY59T8Ox65qJ3J1EvrXcdK0WfUKCCZ5PFKkmIZmZLehekKQY4IzP"
      organization = "monitoring"
      bucket = "nginx"

    [[outputs.file]]
      files = ["stdout"]

    [[inputs.nginx]]
      urls = ["http://nginx/nginx_status"]

    [[inputs.tail]]
      # FIX 1: pakai wildcard yang benar — match access.log, app1_access.log, dst
      files = ["/var/log/nginx/*access.log"]
      from_beginning = true
      watch_method = "inotify"
      name_override = "nginx_access"
      data_format = "grok"
      # FIX 2: grok_custom_patterns tanpa indentasi
      grok_custom_patterns = 'SIGNED_NUMBER [-+]?[0-9]+(?:\.[0-9]+)?'
      # Format log: IP STATUS TIME "METHOD URI HTTP/VER" "CC" "COUNTRY" "CITY" LAT LON "HOST"
      grok_patterns = ["%{IP:client_ip} %{NUMBER:status:int} %{NUMBER:request_time:float} \"%{DATA:method} %{DATA:uri} HTTP/%{DATA:http_version}\" \"%{DATA:country_code:tag}\" \"%{DATA:country_name:tag}\" \"%{DATA:city_name:tag}\" %{SIGNED_NUMBER:latitude:float} %{SIGNED_NUMBER:longitude:float} \"%{DATA:app_host:tag}\""]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      serviceAccountName: telegraf-sa
      containers:
        - name: telegraf
          image: telegraf:1.30
          volumeMounts:
            - name: telegraf-config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
      volumes:
        - name: telegraf-config
          configMap:
            name: telegraf-config
        - name: nginx-logs
          persistentVolumeClaim:
            claimName: nginx-logs-pvc
