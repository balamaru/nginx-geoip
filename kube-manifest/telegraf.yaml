---
apiVersion: v1
kind: ConfigMap
metadata:
  name: telegraf-config
  namespace: monitoring
data:
  telegraf.conf: |
    [agent]
      interval = "10s"
      round_interval = true
      metric_batch_size = 1000
      metric_buffer_limit = 10000

    [global_tags]
      service = "nginx"
      env = "dev"
      instance = "nginx-1"

    [[outputs.influxdb_v2]]
      urls = ["http://influxdb:8086"]
      token = "supersecrettoken"
      organization = "monitoring"
      bucket = "nginx"

    [[inputs.nginx]]
      urls = ["http://nginx/nginx_status"]

    [[inputs.tail]]
      files = ["/var/log/nginx/access.log"]
      from_beginning = true
      name_override = "nginx_access"
      data_format = "grok"
      grok_patterns = ["%{IP:client_ip} %{NUMBER:status:int} %{NUMBER:request_time:float} \"%{WORD:method} %{DATA:uri} HTTP/%{NUMBER:http_version}\" \"%{DATA:country_code:tag}\" \"%{DATA:country_name:tag}\" \"%{DATA:city_name:tag}\" %{NUMBER:latitude:float} %{NUMBER:longitude:float}"]

    [[outputs.file]]
      files = ["stdout"]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegraf
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegraf
  template:
    metadata:
      labels:
        app: telegraf
    spec:
      containers:
        - name: telegraf
          image: telegraf:1.30
          volumeMounts:
            - name: telegraf-config
              mountPath: /etc/telegraf/telegraf.conf
              subPath: telegraf.conf
            - name: nginx-logs
              mountPath: /var/log/nginx
              readOnly: true
      volumes:
        - name: telegraf-config
          configMap:
            name: telegraf-config
        - name: nginx-logs
          persistentVolumeClaim:
            claimName: nginx-logs-pvc