---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: nginx-sa
  namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: nginx-sa
  namespace: monitoring
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch", "update", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: nginx-sa
rules:
  - apiGroups:     ['policy']
    resources:     ['podsecuritypolicies']
    verbs:         ['use']
    resourceNames: ['nginx-sa']
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions"]
    resources: ["ingresses", "ingresses/status"]
    verbs: ["get", "list", "watch", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: nginx-sa
  namespace: monitoring
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: nginx-sa
subjects:
  - kind: ServiceAccount
    name: nginx-sa
    namespace: monitoring

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: nginx-sa
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: nginx-sa
subjects:
- kind: ServiceAccount
  name: nginx-sa
  namespace: monitoring

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: monitoring
data:
  nginx.conf: |
    load_module modules/ngx_http_geoip2_module.so;

    worker_processes auto;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  text/plain;

      sendfile        on;
      keepalive_timeout  65;

      geoip2 /etc/nginx/geoip/GeoLite2-Country.mmdb {
        $geoip_country_code country iso_code;
        $geoip_country_name country names en;
      }

      geoip2 /etc/nginx/geoip/GeoLite2-City.mmdb {
        $geoip_city_name city names en;
        $geoip_latitude location latitude;
        $geoip_longitude location longitude;
      }

      # FIX: $host dipisah dengan spasi dan diberi quotes agar konsisten
      log_format telegraf_geo
        '$remote_addr '
        '$status '
        '$request_time '
        '"$request" '
        '"$geoip_country_code" '
        '"$geoip_country_name" '
        '"$geoip_city_name" '
        '$geoip_latitude '
        '$geoip_longitude '
        '"$host"';

      access_log /var/log/nginx/access.log telegraf_geo;

      include /etc/nginx/conf.d/*.conf;
    }

  app-1.conf: |
    server {
      listen 80;
      server_name app1.test;
      access_log /var/log/nginx/app1_access.log telegraf_geo;
      location / {
        return 200 "App 1 Online\n";
      }
      location /nginx_status {
        stub_status;
        access_log off;
      }
    }

  app-2.conf: |
    server {
      listen 80;
      server_name app2.test;
      access_log /var/log/nginx/app2_access.log telegraf_geo;
      location / {
        return 200 "App 2 Online\n";
      }
      location /nginx_status {
        stub_status;
        access_log off;
      }
    }

  app-3.conf: |
    server {
      listen 80;
      server_name app3.test;
      access_log /var/log/nginx/app3_access.log telegraf_geo;
      location / {
        return 200 "App 3 Online\n";
      }
      location /nginx_status {
        stub_status;
        access_log off;
      }
    }

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: nginx-logs-pvc
  namespace: monitoring
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 1Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      serviceAccountName: nginx-sa
      containers:
        - name: nginx
          image: balamaru/nginx-geoip:1.0
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-main-config
              mountPath: /etc/nginx/nginx.conf
              subPath: nginx.conf
            - name: nginx-app-configs
              mountPath: /etc/nginx/conf.d
            - name: nginx-logs
              mountPath: /var/log/nginx
      volumes:
        - name: nginx-main-config
          configMap:
            name: nginx-config
            items:
              - key: nginx.conf
                path: nginx.conf
        - name: nginx-app-configs
          configMap:
            name: nginx-config
            items:
              - key: app-1.conf
                path: app-1.conf
              - key: app-2.conf
                path: app-2.conf
              - key: app-3.conf
                path: app-3.conf
        - name: nginx-logs
          persistentVolumeClaim:
            claimName: nginx-logs-pvc

---
apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: monitoring
spec:
  selector:
    app: nginx
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
